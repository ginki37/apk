definitions:
  android_apk_artifacts: &android_apk_artifacts
    - app/build/outputs/apk/**/*.apk
    - app/build/outputs/apk/**/output-metadata.json
    - app/build/outputs/mapping/**/mapping.txt
    - app/build/reports/tests/**

workflows:
  android-native-build:
    name: AI 3D Studio Mobile - Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - name: Grant execute permission
        script: chmod +x gradlew

      - name: Generate local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Clean
        script: ./gradlew clean --no-daemon

      - name: Build Debug APK
        script: ./gradlew assembleDebug --no-daemon

    artifacts: *android_apk_artifacts
