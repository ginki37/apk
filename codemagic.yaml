definitions:
  android_apk_artifacts: &android_apk_artifacts
    - AI3DStudioMobile/app/build/outputs/apk/**/*.apk
    - AI3DStudioMobile/app/build/outputs/apk/**/output-metadata.json
    - AI3DStudioMobile/app/build/outputs/mapping/**/mapping.txt
    - AI3DStudioMobile/app/build/reports/tests/**

workflows:
  android-native-build:
    name: AI 3D Studio Mobile - Android Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - name: Show repository structure
        script: |
          pwd
          ls -la
          ls -la AI3DStudioMobile || true

      - name: Grant execute permission
        script: |
          cd AI3DStudioMobile
          chmod +x gradlew

      - name: Generate local.properties
        script: |
          cd AI3DStudioMobile
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Clean project
        script: |
          cd AI3DStudioMobile
          ./gradlew clean --no-daemon

      - name: Build Debug APK
        script: |
          cd AI3DStudioMobile
          ./gradlew assembleDebug --no-daemon

    artifacts: *android_apk_artifacts
